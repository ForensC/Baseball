name: 更新 CPBL 資料（目前僅支援手動觸發）

# 原本的每日排程（cron）已停用：CPBL 官網的 CDN 會擋掉來自 GitHub Actions
# 伺服器（微軟 Azure 機房 IP）的請求，回傳 HTTP 404，導致排程必定失敗。
# 手動觸發（workflow_dispatch）跑在同一批機房，理論上一樣會被擋；
# 目前資料改為需要時在其他能連到 CPBL 的環境手動執行
# `node scripts/fetch-cpbl.mjs` 後 commit + push。詳見 README「資料更新」一節。
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: 抓取賽程與新聞
        run: node scripts/fetch-cpbl.mjs
      - name: 提交變更
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/data
          git diff --cached --quiet || git commit -m 'chore: 更新 CPBL 賽程與新聞資料'
          git push
