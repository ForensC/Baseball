name: 每日更新 CPBL 資料

on:
  schedule:
    - cron: '0 22 * * *' # 台灣時間每天早上 6:00
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: 抓取賽程與新聞
        run: node scripts/fetch-cpbl.mjs
      - name: 提交變更
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/data
          git diff --cached --quiet || git commit -m 'chore: 更新 CPBL 賽程與新聞資料'
          git push
